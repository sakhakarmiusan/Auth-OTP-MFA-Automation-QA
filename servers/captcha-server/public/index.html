<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAPTCHA Verification (5000)</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="card">
    <h1>CAPTCHA-only Registration</h1>
    <p class="subtitle">Register with email/password → CAPTCHA → Dashboard</p>

    <div id="error" class="msg error" style="display:none;"></div>
    <div id="success" class="msg success" style="display:none;"></div>

    <div class="tabs">
      <button class="tab active" id="tabRegister" type="button">Register</button>
      <button class="tab" id="tabLogin" type="button">Login</button>
    </div>

    <section id="registerSection">
      <form id="registerForm">
        <label>Name</label>
        <input id="regName" type="text" required />

        <label>Email</label>
        <input id="regEmail" type="email" required />

        <label>Password</label>
        <input id="regPassword" type="password" minlength="6" required />

        <button id="registerBtn" type="submit">Register</button>
      </form>
    </section>

    <section id="captchaSection" style="display:none;">
      <div class="captcha-box">
        <div id="captchaImage" class="captcha-image"></div>
        <button id="refreshBtn" type="button" class="link-btn">Load new CAPTCHA</button>
      </div>
      <form id="captchaForm">
        <label for="captchaAnswer">Enter CAPTCHA</label>
        <input id="captchaAnswer" type="text" autocomplete="off" required />
        <button id="submitBtn" type="submit">Verify CAPTCHA</button>
      </form>
    </section>

    <section id="loginSection" style="display:none;">
      <form id="loginForm">
        <label>Email</label>
        <input id="loginEmail" type="email" required />

        <label>Password</label>
        <input id="loginPassword" type="password" required />

        <button id="loginBtn" type="submit">Login</button>
      </form>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
